services:
  backend:
    build: .
    ports:
      - "3001:3001"
    volumes:
      - ./transcriptions:/app/transcriptions
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
